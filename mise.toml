[tools]
node = "25"
pnpm = "latest"
"npm:@biomejs/biome" = "latest"
"npm:@mariozechner/pi-coding-agent" = "latest"
"npm:btca" = "latest"
bun = "latest"

[env]
NODE_ENV = "development"
FORCE_COLOR = "1"

[tasks.install]
description = "Install workspace dependencies"
run = "pnpm install"

[tasks.lint]
description = "Run Biome lint checks"
run = "pnpm lint"

[tasks.format]
description = "Format repository with Biome"
run = "pnpm format"

[tasks.typecheck]
description = "Type-check all workspace packages"
run = "pnpm typecheck"

[tasks.test]
description = "Run test suite"
run = "pnpm test"

[tasks.test_watch]
description = "Run tests in watch mode"
run = "pnpm test:watch"

[tasks.check]
description = "Run lint + typecheck + tests"
depends = ["lint", "typecheck", "test"]

[tasks.dev]
description = "Start pi in this repo (project-local .pi/extensions auto-discovered)"
run = "pi"

[tasks.dev_stale_write_guard]
description = "Start pi with the stale-write-guard extension explicitly"
run = "pi -e .pi/extensions/stale-write-guard.ts"

[tasks.btca_resources]
description = "List configured btca resources"
run = "btca resources"

[prepare.pnpm]
auto = true

